appId: org.cellarboss.mobile
---
- runFlow: ../shared/setup-and-login.yaml

# --- Winemakers ---
- tapOn:
    id: "more-tab"
- waitForAnimationToEnd
- tapOn:
    id: "menu-winemakers"
- waitForAnimationToEnd
- takeScreenshot: winemakers-list

# --- Regions ---
- tapOn:
    id: "more-tab"
- waitForAnimationToEnd
- tapOn:
    id: "menu-regions"
- waitForAnimationToEnd
- takeScreenshot: regions-list

# --- Countries ---
- tapOn:
    id: "more-tab"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "menu-countries"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "menu-countries"
- waitForAnimationToEnd
- takeScreenshot: countries-list

# --- Grapes ---
- tapOn:
    id: "more-tab"
- waitForAnimationToEnd
- tapOn:
    id: "menu-grapes"
- waitForAnimationToEnd
- takeScreenshot: grapes-list

# --- Locations ---
- tapOn:
    id: "more-tab"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "menu-locations"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "menu-locations"
- waitForAnimationToEnd
- takeScreenshot: locations-list

# --- Storages (use tab) ---
- tapOn:
    id: "storages-tab"
- waitForAnimationToEnd
- takeScreenshot: storages-list
