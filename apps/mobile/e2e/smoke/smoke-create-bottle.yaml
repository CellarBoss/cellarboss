appId: org.cellarboss.mobile
---
- runFlow: smoke-login.yaml

# Wait for tabs to be fully loaded after login
- extendedWaitUntil:
    visible:
      id: "cellar-tab"
    timeout: 10000

# Navigate to Cellar tab
- tapOn:
    id: "cellar-tab"

# Tap FAB to create new bottle
- tapOn:
    id: "fab-add"
- assertVisible: "New Bottle"

# Select wine and vintage
- tapOn: "Choose a wine..."
- assertVisible: "Select Wine"
- tapOn:
    text: "Château Margaux"
    index: 1
- assertVisible: "Vintage"
- tapOn: "2015"

# Fill in purchase date
- tapOn:
    id: "field-purchase-date"
- eraseText
- inputText: "2025-01-15"
- hideKeyboard

# Fill in purchase price
- tapOn:
    id: "field-purchase-price"
- eraseText
- inputText: "75.00"
- hideKeyboard

# Scroll to save button
- scrollUntilVisible:
    element:
      id: "save-button"
    direction: DOWN
    timeout: 10000

# Save the bottle
- tapOn:
    id: "save-button"
- extendedWaitUntil:
    visible:
      text: "Saved successfully!"
    timeout: 10000
