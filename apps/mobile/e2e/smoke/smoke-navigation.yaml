appId: org.cellarboss.mobile
---
- runFlow: smoke-login.yaml

# Wait for tabs to be fully loaded after login
- extendedWaitUntil:
    visible:
      id: "cellar-tab"
    timeout: 10000

# Navigate through all tabs
- tapOn:
    id: "cellar-tab"
- waitForAnimationToEnd

- tapOn:
    id: "wines-tab"
- waitForAnimationToEnd

- tapOn:
    id: "storages-tab"
- waitForAnimationToEnd

- tapOn:
    id: "more-tab"
- waitForAnimationToEnd

# Verify more screen renders menu items
- extendedWaitUntil:
    visible:
      id: "menu-wines"
    timeout: 10000
- assertVisible:
    id: "menu-countries"
- scrollUntilVisible:
    element:
      id: "menu-profile"
    direction: DOWN
    timeout: 10000
