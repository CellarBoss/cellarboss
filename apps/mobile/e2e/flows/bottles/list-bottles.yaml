appId: com.cellarboss.mobile
---
- runScript: ../../scripts/seed-data.js
- launchApp:
    clearState: true

# Setup and login
- tapOn:
    id: "server-url-input"
- inputText: "http://10.0.2.2:5174"
- tapOn:
    id: "connect-button"
- tapOn:
    id: "email-input"
- inputText: "admin@cellarboss.test"
- tapOn:
    id: "password-input"
- inputText: "password"
- tapOn:
    id: "sign-in-button"

# Navigate to Cellar tab
- tapOn:
    id: "cellar-tab"

# Verify bottle list shows default data (1 bottle of Château Margaux 2015)
- assertVisible: "Château Margaux 2015"

# Test search functionality
- tapOn:
    id: "search-input"
- inputText: "Margaux"
- assertVisible: "Château Margaux 2015"

# Clear search
- tapOn:
    id: "search-input"
- eraseText: 7
