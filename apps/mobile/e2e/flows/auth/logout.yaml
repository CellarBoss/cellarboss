appId: com.cellarboss.mobile
---
- runScript: ../../scripts/seed-data.js
- launchApp:
    clearState: true

# Setup and login
- tapOn:
    id: "server-url-input"
- inputText: "http://10.0.2.2:5174"
- tapOn:
    id: "connect-button"
- assertVisible: "Sign In"
- tapOn:
    id: "email-input"
- inputText: "admin@cellarboss.test"
- tapOn:
    id: "password-input"
- inputText: "password"
- tapOn:
    id: "sign-in-button"
- assertVisible:
    id: "dashboard-tab"

# Navigate to More tab and sign out
- tapOn:
    id: "more-tab"
- tapOn:
    id: "menu-sign-out"

# Should return to login/setup screen
- assertVisible: "Sign In"
