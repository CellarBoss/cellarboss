appId: org.cellarboss.mobile
---
- runScript: ../../scripts/seed-data.js
- launchApp:
    clearState: true

# Setup and login
- tapOn:
    id: "server-url-input"
- inputText: "http://10.0.2.2:5174"
- tapOn:
    id: "connect-button"
- tapOn:
    id: "email-input"
- inputText: "admin@cellarboss.test"
- tapOn:
    id: "password-input"
- inputText: "password"
- tapOn:
    id: "sign-in-button"
- assertVisible:
    id: "dashboard-tab"

# Switch to Cellar tab
- tapOn:
    id: "cellar-tab"
- assertVisible: "Search bottles..."

# Switch to Wines tab
- tapOn:
    id: "wines-tab"
- assertVisible: "Search wines..."

# Switch to Storages tab
- tapOn:
    id: "storages-tab"
- assertVisible: "Search storages..."

# Switch to More tab
- tapOn:
    id: "more-tab"
- assertVisible: "Reference Data"

# Switch back to Dashboard
- tapOn:
    id: "dashboard-tab"
