appId: org.cellarboss.mobile
---
- runScript: ../../scripts/seed-data.js
- launchApp:
    clearState: true

# Setup and login
- tapOn:
    id: "server-url-input"
- inputText: "http://10.0.2.2:5174"
- tapOn:
    id: "connect-button"
- tapOn:
    id: "email-input"
- inputText: "admin@cellarboss.test"
- tapOn:
    id: "password-input"
- inputText: "password"
- tapOn:
    id: "sign-in-button"

# Navigate to More > Tasting Notes
- tapOn:
    id: "more-tab"
- tapOn:
    id: "menu-tasting-notes"

# Verify existing tasting note
- assertVisible: "Exceptional depth"

# Create new tasting note
- tapOn:
    id: "fab-add"
- assertVisible: "New Tasting Note"

# Fill in the notes textarea
- tapOn:
    id: "field-notes"
- inputText: "Lovely nose with cherry and oak. Smooth tannins."

# Save
- tapOn:
    id: "save-button"
