appId: org.cellarboss.mobile
---
- runScript: ../../scripts/seed-data.js
- launchApp:
    clearState: true

# Setup and login
- tapOn:
    id: "server-url-input"
- inputText: "http://10.0.2.2:5174"
- tapOn:
    id: "connect-button"
- tapOn:
    id: "email-input"
- inputText: "admin@cellarboss.test"
- tapOn:
    id: "password-input"
- inputText: "password"
- tapOn:
    id: "sign-in-button"

# Navigate to More > Locations
- tapOn:
    id: "more-tab"
- tapOn:
    id: "menu-locations"

# Verify existing locations
- assertVisible: "Home Cellar"

# Create new location
- tapOn:
    id: "fab-add"
- assertVisible: "New Location"
- tapOn:
    id: "field-name"
- inputText: "Office Wine Fridge"
- tapOn:
    id: "save-button"
- assertVisible: "Saved successfully"
