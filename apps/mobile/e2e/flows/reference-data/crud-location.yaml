appId: org.cellarboss.mobile
---
- runFlow: ../../shared/setup-and-login.yaml

# Navigate to More > Locations
- tapOn:
    id: "more-tab"
- scrollUntilVisible:
    element:
      id: "menu-locations"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "menu-locations"

# Verify existing locations
- assertVisible: "Home Cellar"

# Create new location
- tapOn:
    id: "fab-add"
- assertVisible: "New Location"
- tapOn:
    id: "field-name"
- inputText: "Office Wine Fridge"
- hideKeyboard
- tapOn:
    id: "save-button"
- assertVisible: "Saved successfully!"
