appId: org.cellarboss.mobile
---
- runFlow: ../../shared/setup-and-login.yaml

# Navigate to More > Regions
- tapOn:
    id: "more-tab"
- tapOn:
    id: "menu-regions"

# Verify existing regions
- assertVisible: "Bordeaux"
- assertVisible: "Burgundy"

# Create new region
- tapOn:
    id: "fab-add"
- assertVisible: "New Region"
- tapOn:
    id: "field-name"
- inputText: "Champagne"

# Select country
- tapOn:
    id: "selector-country"
- tapOn: "France"

- tapOn:
    id: "save-button"
- assertVisible: "Saved successfully"
