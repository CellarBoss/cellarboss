appId: org.cellarboss.mobile
---
- runFlow: ../../shared/setup-and-login.yaml

# Navigate to Wines tab
- tapOn:
    id: "wines-tab"

# Verify wine is listed
- assertVisible: "Château Margaux"

# Swipe left on the wine to reveal edit action
# Note: "Château Margaux" appears twice per list item (wine name + winemaker subtitle).
# Use index: 0 to target the title text so the swipe registers on the swipeable row.
- swipe:
    direction: LEFT
    from:
      text: "Château Margaux"
      index: 0
- waitForAnimationToEnd

# Tap the edit icon that appears
- tapOn:
    id: "swipe-action-pencil"

# Verify edit screen loaded with pre-filled data
- assertVisible: "Edit Wine"
- assertVisible: "Château Margaux"
- waitForAnimationToEnd

# Update the wine name
- tapOn:
    id: "field-name"
- eraseText
- tapOn:
    id: "field-name"
- inputText: "Château Margaux Grand Vin"
- hideKeyboard

# Save
- tapOn:
    id: "save-button"
- extendedWaitUntil:
    visible:
      text: "Saved successfully!"
    timeout: 10000
