version: "3.9"

services:
  db:
    image: postgres:18@sha256:ddbc320a9ad558c01c719248108e607eadde92fea799fec799028cfb2fab7319
    environment:
      POSTGRES_USER: cbuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cellarboss
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbuser -d cellarboss"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      BETTER_AUTH_SECRET: supersecretkeythatshouldnotbeusedinproduction
      BETTER_AUTH_URL: http://backend:5000
      DATABASE_TYPE: sqlite
      DATABASE_URL: 'cellarboss.db'
      NODE_ENV: development
      CORS: http://localhost:3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      CELLARBOSS_SERVER: http://backend:5000
      BETTER_AUTH_SECRET: supersecretkeythatshouldnotbeusedinproduction
      BETTER_AUTH_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
