version: "3.9"

services:
  db:
    image: postgres:18@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
    environment:
      POSTGRES_USER: cbuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cellarboss
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbuser -d cellarboss"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      BETTER_AUTH_SECRET: supersecretkeythatshouldnotbeusedinproduction
      BETTER_AUTH_URL: http://backend:5000
      DATABASE_TYPE: postgres
      DATABASE_URL: 'postgresql://cbuser:secret@db:5432/cellarboss'
      NODE_ENV: development
      CORS: http://localhost:3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      CELLARBOSS_SERVER: http://backend:5000
      BETTER_AUTH_SECRET: supersecretkeythatshouldnotbeusedinproduction
      BETTER_AUTH_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
