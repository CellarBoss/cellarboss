name: PR Labeler & Release Draft

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  label:
    name: Autolabel & Update Draft
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: release-drafter/release-drafter/autolabeler@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        if: github.event_name == 'pull_request_target'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
