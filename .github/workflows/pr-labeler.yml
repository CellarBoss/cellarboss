name: PR Labeler & Release Draft

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  label:
    name: Autolabel & Update Draft
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: release-drafter/release-drafter/autolabeler@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7
        if: github.event_name == 'pull_request_target'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
