name: PR Labeler & Release Draft

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  label:
    name: Autolabel & Update Draft
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@73b95fa1c286dfd6802a4f949b07dad6149f2b0f # v7.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: release-drafter/release-drafter/autolabeler@73b95fa1c286dfd6802a4f949b07dad6149f2b0f # v7.5.0
        if: github.event_name == 'pull_request_target'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
