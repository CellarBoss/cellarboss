name: CI Tests

on:
  workflow_call:
    inputs:
      detect-changes:
        description: 'Run path-based change detection to conditionally skip unchanged test suites'
        type: boolean
        default: false
      upload-coverage:
        description: 'Run test:coverage instead of test and upload coverage artifacts'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web || 'true' }}
      backend: ${{ steps.filter.outputs.backend || 'true' }}
      mobile: ${{ steps.filter.outputs.mobile || 'true' }}
      packages: ${{ steps.filter.outputs.packages || 'true' }}
      structure: ${{ steps.filter.outputs.structure || 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: inputs.detect-changes

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: inputs.detect-changes
        with:
          filters: |
            web:
              - 'apps/web/**'
            backend:
              - 'apps/backend/**'
            mobile:
              - 'apps/mobile/**'
            packages:
              - 'packages/validators/**'
              - 'packages/types/**'
              - 'packages/common/**'
            structure:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'

  test-web-functions:
    name: Test WebUI Functions
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Build frontend
        run: pnpm --filter @cellarboss/web build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CELLARBOSS_SERVER: http://localhost:5000
          BETTER_AUTH_SECRET: ci-build-placeholder
          BETTER_AUTH_URL: http://localhost:5000

      - name: Run web unit tests
        run: pnpm --filter @cellarboss/web ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-web
          path: apps/web/coverage/
          retention-days: 1

  test-validators:
    name: Test Validators
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Run validators unit tests
        run: pnpm --filter @cellarboss/validators ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-validators
          path: packages/validators/coverage/
          retention-days: 1

  test-common:
    name: Test Common
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Run common unit tests
        run: pnpm --filter @cellarboss/common ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-common
          path: packages/common/coverage/
          retention-days: 1

  test-backend:
    name: Test Backend (${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - db: sqlite
            DATABASE_TYPE: sqlite
            DATABASE_URL: ':memory:'
          - db: postgres
            DATABASE_TYPE: postgres
            DATABASE_URL: 'postgresql://cellar:cellar@localhost:5432/cellartest'
          - db: mysql
            DATABASE_TYPE: mysql
            DATABASE_URL: 'mysql://cellar:cellar@localhost:3306/cellartest'

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cellar
          POSTGRES_PASSWORD: cellar
          POSTGRES_DB: cellartest
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cellar"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: cellar
          MYSQL_USER: cellar
          MYSQL_PASSWORD: cellar
          MYSQL_DATABASE: cellartest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Build backend
        run: pnpm --filter backend build

      - name: Run backend tests
        run: pnpm --filter backend ${{ inputs.upload-coverage && 'test:coverage' || 'test' }} -- ${{ matrix.db != 'sqlite' && '--no-file-parallelism' || '' }}
        env:
          DATABASE_TYPE: ${{ matrix.DATABASE_TYPE }}
          DATABASE_URL: ${{ matrix.DATABASE_URL }}
          NODE_ENV: test
          BETTER_AUTH_URL: http://localhost:3000
          BETTER_AUTH_SECRET: ci-test-placeholder

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-backend-${{ matrix.db }}
          path: apps/backend/coverage/
          retention-days: 1

  test-mobile:
    name: Test Mobile
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Run mobile unit tests
        run: pnpm --filter @cellarboss/mobile ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-mobile
          path: apps/mobile/coverage/
          retention-days: 1

  test-web-e2e:
    name: Test WebUI E2E
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @cellarboss/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @cellarboss/web exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @cellarboss/web test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CELLARBOSS_SERVER: http://localhost:5173
          BETTER_AUTH_SECRET: e2e-test-secret
          BETTER_AUTH_URL: http://localhost:5173
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright results JSON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: playwright-results
          path: apps/web/playwright-results.json
          retention-days: 1

      - name: Upload failure screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-screenshots
          path: apps/web/test-results/
          retention-days: 7

  validate-expo:
    name: Validate Expo Setup
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Expo doctor
        working-directory: apps/mobile
        run: npx expo-doctor@latest --verbose

      - name: Expo dependency check
        working-directory: apps/mobile
        run: npx expo install --check

  validate-api-docs:
    name: Validate API Docs
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Validate API docs generation
        run: pnpm --filter backend generate:docs

  validate-web-docs:
    name: Validate WebUI User Docs
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Build docs (without screenshots)
        run: pnpm --filter @cellarboss/web docs:build

  validate-mobile-docs:
    name: Validate Mobile User Docs
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.packages == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Build docs (without screenshots)
        run: pnpm --filter @cellarboss/mobile docs:build
