name: CI Tests

on:
  workflow_call:
    inputs:
      detect-changes:
        description: 'Run path-based change detection to conditionally skip unchanged test suites'
        type: boolean
        default: false
      upload-coverage:
        description: 'Run test:coverage instead of test and upload coverage artifacts'
        type: boolean
        default: false
        
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web || 'true' }}
      backend: ${{ steps.filter.outputs.backend || 'true' }}
      mobile: ${{ steps.filter.outputs.mobile || 'true' }}
      packages: ${{ steps.filter.outputs.packages || 'true' }}
      structure: ${{ steps.filter.outputs.structure || 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: inputs.detect-changes

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: inputs.detect-changes
        with:
          filters: |
            web:
              - 'apps/web/**'
            backend:
              - 'apps/backend/**'
            mobile:
              - 'apps/mobile/**'
            packages:
              - 'packages/validators/**'
              - 'packages/types/**'
              - 'packages/common/**'
            structure:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'

  test-web-functions:
    name: Test WebUI Functions
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Build frontend
        run: pnpm --filter @cellarboss/web build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CELLARBOSS_SERVER: http://localhost:5000
          BETTER_AUTH_SECRET: ci-build-placeholder
          BETTER_AUTH_URL: http://localhost:5000

      - name: Run web unit tests
        run: pnpm --filter @cellarboss/web ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-web
          path: apps/web/coverage/
          retention-days: 1

  test-validators:
    name: Test Validators
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Run validators unit tests
        run: pnpm --filter @cellarboss/validators ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-validators
          path: packages/validators/coverage/
          retention-days: 1

  test-common:
    name: Test Common
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Run common unit tests
        run: pnpm --filter @cellarboss/common ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-common
          path: packages/common/coverage/
          retention-days: 1

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Build backend
        run: pnpm --filter backend build

      - name: Run backend tests
        run: pnpm --filter backend ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}
        env:
          DATABASE_TYPE: sqlite
          DATABASE_URL: ':memory:'
          NODE_ENV: test
          BETTER_AUTH_URL: http://localhost:3000
          BETTER_AUTH_SECRET: ci-test-placeholder

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-backend
          path: apps/backend/coverage/
          retention-days: 1

  test-mobile:
    name: Test Mobile
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Run mobile unit tests
        run: pnpm --filter @cellarboss/mobile ${{ inputs.upload-coverage && 'test:coverage' || 'test' }}

      - name: Upload coverage
        if: inputs.upload-coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-mobile
          path: apps/mobile/coverage/
          retention-days: 1

  test-web-e2e:
    name: Test WebUI E2E
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @cellarboss/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @cellarboss/web exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @cellarboss/web test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CELLARBOSS_SERVER: http://localhost:5173
          BETTER_AUTH_SECRET: e2e-test-secret
          BETTER_AUTH_URL: http://localhost:5173
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright results JSON
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: playwright-results
          path: apps/web/playwright-results.json
          retention-days: 1

      - name: Upload failure screenshots
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: failure()
        with:
          name: playwright-screenshots
          path: apps/web/test-results/
          retention-days: 7

  test-mobile-e2e-android:
    name: Test Mobile E2E (Android)
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Cache AVD
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-${{ runner.os }}

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          sdkmanager "system-images;android-31;google_apis;x86_64"
          echo "no" | avdmanager create avd -n test_device -k "system-images;android-31;google_apis;x86_64" --device "pixel_6" --force

      - name: Cache Expo prebuild
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: expo-prebuild-cache
        with:
          path: apps/mobile/android/
          key: expo-prebuild-android-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/app.config.ts') }}

      - name: Expo prebuild (Android)
        if: steps.expo-prebuild-cache.outputs.cache-hit != 'true'
        run: cd apps/mobile && npx expo prebuild --platform android --clean

      - name: Cache Gradle
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Android release APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease -PreactNativeArchitectures=x86_64 --no-daemon --build-cache

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start mock server
        run: pnpm --filter @cellarboss/mock-server start &

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start emulator and run tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          avd-name: test_device
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            cd apps/mobile/e2e && maestro test --debug-output "$GITHUB_WORKSPACE/maestro-debug-output" --flatten-debug-output flows/

      - name: Upload Maestro debug output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: maestro-debug-output
          path: maestro-debug-output/
          retention-days: 7

  validate-api-docs:
    name: Validate API Docs
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.structure == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Validate API docs generation
        run: pnpm --filter backend generate:docs

  validate-web-docs:
    name: Validate WebUI User Docs
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Build docs (without screenshots)
        run: pnpm --filter @cellarboss/web docs:build
