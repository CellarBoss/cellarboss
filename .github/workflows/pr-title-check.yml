name: PR Title Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read
  statuses: write

jobs:
  check-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed conventional commit types
          types: |
            feat
            fix
            refactor
            chore
            docs
            deps
          # Require a subject after the colon (e.g. "feat: add bottle search")
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            The PR title must have a description after the type prefix.
            Example: "feat: add bottle search"
          ignoreLabels: |
            skip-changelog
