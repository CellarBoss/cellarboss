name: PR Test Reports

on:
  workflow_run:
    workflows: ['PR Checks']
    types:
      - completed

permissions:
  actions: read
  pull-requests: write

jobs:
  coverage:
    name: Post Coverage Comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download web coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: coverage-web
          path: apps/web/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download validators coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: coverage-validators
          path: packages/validators/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download backend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: coverage-backend
          path: apps/backend/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download common coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: coverage-common
          path: packages/common/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download mobile coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: coverage-mobile
          path: apps/mobile/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Web coverage report
        if: hashFiles('apps/web/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2
        with:
          name: Web
          working-directory: apps/web

      - name: Validators coverage report
        if: hashFiles('packages/validators/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2
        with:
          name: Validators
          working-directory: packages/validators

      - name: Backend coverage report
        if: hashFiles('apps/backend/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2
        with:
          name: Backend
          working-directory: apps/backend

      - name: Common coverage report
        if: hashFiles('packages/common/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2
        with:
          name: Common
          working-directory: packages/common

      - name: Mobile coverage report
        if: hashFiles('apps/mobile/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2
        with:
          name: Mobile
          working-directory: apps/mobile

  playwright:
    name: Post Playwright Report
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download Playwright results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        id: download
        with:
          name: playwright-results
          path: playwright/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Playwright report summary
        if: steps.download.outcome == 'success'
        uses: daun/playwright-report-summary@1229105480a2a4bdd91598d8a146fbab41343fce # v3
        with:
          report-file: playwright/playwright-results.json
          comment-title: Playwright E2E Results
          job-summary: true
