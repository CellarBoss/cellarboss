name: PR Test Reports

on:
  workflow_run:
    workflows: ['PR Checks']
    types:
      - completed

permissions:
  actions: read
  pull-requests: write

jobs:
  coverage:
    name: Post Coverage Comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download web coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: coverage-web
          path: apps/web/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download validators coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: coverage-validators
          path: packages/validators/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download backend coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: coverage-backend
          path: apps/backend/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Web coverage report
        if: hashFiles('apps/web/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          name: Web
          working-directory: apps/web

      - name: Validators coverage report
        if: hashFiles('packages/validators/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          name: Validators
          working-directory: packages/validators

      - name: Backend coverage report
        if: hashFiles('apps/backend/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          name: Backend
          working-directory: apps/backend

  playwright:
    name: Post Playwright Report
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download Playwright results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        id: download
        with:
          name: playwright-results
          path: playwright/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Playwright report summary
        if: steps.download.outcome == 'success'
        uses: daun/playwright-report-summary@be9e270edd5ad86038604d3caa84a819a6ff6fed # v3
        with:
          report-file: playwright/playwright-results.json
          comment-title: Playwright E2E Results
          job-summary: true
