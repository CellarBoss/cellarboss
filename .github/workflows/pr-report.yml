name: PR Test Coverage Report

on:
  workflow_run:
    workflows: ['PR Checks']
    types:
      - completed

permissions:
  actions: read
  pull-requests: write

jobs:
  report:
    name: Post Coverage Comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download web coverage
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4
        continue-on-error: true
        with:
          name: coverage-web
          path: apps/web/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download validators coverage
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4
        continue-on-error: true
        with:
          name: coverage-validators
          path: packages/validators/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download backend coverage
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4
        continue-on-error: true
        with:
          name: coverage-backend
          path: apps/backend/coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Web coverage report
        if: hashFiles('apps/web/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          name: Web
          working-directory: apps/web

      - name: Validators coverage report
        if: hashFiles('packages/validators/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          name: Validators
          working-directory: packages/validators

      - name: Backend coverage report
        if: hashFiles('apps/backend/coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          name: Backend
          working-directory: apps/backend
