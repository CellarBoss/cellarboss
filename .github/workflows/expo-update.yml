name: Expo Auto Update

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  expo-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Run Expo fix
        id: expo-fix
        working-directory: apps/mobile
        run: |
          pnpx expo install --fix
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dedupe dependencies
        if: steps.expo-fix.outputs.changed == 'true'
        run: pnpm dedupe

      - name: Create PR
        id: cpr
        if: steps.expo-fix.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ secrets.PR_TOKEN }}
          commit-message: "Auto sync Expo dependencies"
          delete-branch: true
          title: "deps: Sync Expo dependencies"
          labels: "skip-changelog"
          body: "Automated from workflow, generated with `pnpx expo install --fix`"
          branch: expo-dependency-sync

      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge --merge --auto "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}