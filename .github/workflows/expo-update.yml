name: Expo Auto Update

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  expo-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Run Expo fix
        id: expo-fix
        working-directory: apps/mobile
        run: |
          pnpx expo install --fix
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dedupe dependencies
        if: steps.expo-fix.outputs.changed == 'true'
        run: pnpm dedupe

      - name: Create PR
        id: cpr
        if: steps.expo-fix.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PR_TOKEN }}
          commit-message: "Auto sync Expo dependencies"
          delete-branch: true
          title: "deps: Sync Expo dependencies"
          labels: "skip-changelog"
          body: "Automated from workflow, generated with `pnpx expo install --fix`"
          branch: expo-dependency-sync

      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge --merge --auto "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}