name: Expo Auto Update

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  expo-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Run Expo fix
        working-directory: apps/mobile
        run: pnpx expo install --fix

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PR_TOKEN }}
          commit-message: "Auto sync Expo dependencies"
          title: "deps: Sync Expo dependencies"
          labels: "skip-changelog"
          body: "Automated from workflow, generated with `pnpx expo install --fix`"
          branch: expo-dependency-sync