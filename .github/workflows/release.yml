name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  prettier:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Check formatting
        run: pnpm prettier --check "**/*.{ts,tsx,md}"

  tests:
    name: Tests
    uses: ./.github/workflows/ci-tests.yml

  smoketest-android:
    name: Android Smoke Tests
    uses: ./.github/workflows/smoketest-android.yml

  build-api-docs:
    name: Build API Docs
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Generate API docs
        run: pnpm --filter backend generate:docs
        env:
          APP_VERSION: ${{ github.ref_name }}

      - name: Upload API docs artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: api-docs
          path: apps/backend/docs/
          retention-days: 1

  build-webui-user-docs:
    name: Build WebUI User Docs
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @cellarboss/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @cellarboss/web exec playwright install-deps chromium

      - name: Generate documentation screenshots
        run: pnpm --filter @cellarboss/web docs:screenshots
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CELLARBOSS_SERVER: http://localhost:5173
          BETTER_AUTH_SECRET: docs-build-secret
          BETTER_AUTH_URL: http://localhost:5173

      - name: Build user docs
        run: pnpm --filter @cellarboss/web docs:build

      - name: Upload user docs artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: webui-user-docs
          path: apps/web/docs/.vitepress/dist/
          retention-days: 1

  build-mobile-user-docs:
    name: Build Mobile User Docs
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c # v4

      - name: Cache AVD
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-${{ runner.os }}

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          sdkmanager "system-images;android-31;google_apis;x86_64"
          echo "no" | avdmanager create avd -n test_device -k "system-images;android-31;google_apis;x86_64" --device "pixel_6"

      - name: Cache Expo prebuild
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: expo-prebuild-cache
        with:
          path: apps/mobile/android/
          key: expo-prebuild-android-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/app.config.ts') }}

      - name: Expo prebuild (Android)
        if: steps.expo-prebuild-cache.outputs.cache-hit != 'true'
        run: cd apps/mobile && npx expo prebuild --platform android --clean

      - name: Cache Gradle
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Android release APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease -PreactNativeArchitectures=x86_64 --no-daemon --build-cache

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start mock server
        run: pnpm --filter @cellarboss/mock-server start &

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Generate screenshots
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 180000
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          avd-name: test_device
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            adb install apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            cd apps/mobile && pnpm docs:screenshots

      - name: Build mobile docs
        run: pnpm --filter @cellarboss/mobile docs:build

      - name: Upload mobile docs artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: mobile-user-docs
          path: apps/mobile/docs/.vitepress/dist/
          retention-days: 1

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [build-api-docs, build-webui-user-docs, build-mobile-user-docs]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download API docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: api-docs
          path: _site/api

      - name: Download webUI user docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: webui-user-docs
          path: _site/web

      - name: Download mobile user docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mobile-user-docs
          path: _site/mobile

      - name: Create landing page
        run: |
          cat > _site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Cellarboss Documentation</title>
            <meta http-equiv="refresh" content="0; url=web/">
          </head>
          <body>
            <a href="web/">Web UI User Guide</a> | <a href="mobile/">Mobile App Guide</a> | <a href="api/">API Reference</a>
          </body>
          </html>
          LANDING

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c # v4

      - name: Cache Expo prebuild
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: apps/mobile/android/
          key: expo-prebuild-android-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/app.config.ts') }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Expo prebuild (Android)
        run: cd apps/mobile && npx expo prebuild --platform android --clean
        env:
          APP_VERSION: ${{ github.ref_name }}

      - name: Build Android release AAB
        run: |
          cd apps/mobile/android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 1

  create-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-frontend, docker-backend, build-android]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Android AAB
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: android-aab
          path: artifacts/

      - name: Rename AAB with version
        run: mv artifacts/app-release.aab artifacts/cellarboss-${{ github.ref_name }}-android.aab

      - uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7
        id: release
        with:
          publish: true
          tag: ${{ github.ref_name }}
          name: 'Release ${{ github.ref_name }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB to release
        run: gh release upload ${{ github.ref_name }} artifacts/cellarboss-${{ github.ref_name }}-android.aab --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/cellarboss-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/cellarboss-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
