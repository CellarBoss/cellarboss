name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Default to read-only; jobs that need to write elevate their own permissions.
permissions:
  contents: read

jobs:
  prettier:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Check formatting
        run: pnpm prettier --check "**/*.{ts,tsx,md}"

  tests:
    name: Tests
    uses: ./.github/workflows/ci-tests.yml

  smoketest-android:
    name: Android Smoke Tests
    uses: ./.github/workflows/smoketest-android.yml

  build-api-docs:
    name: Build API Docs
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Generate API docs
        run: pnpm --filter backend generate:docs
        env:
          APP_VERSION: ${{ github.ref_name }}

      - name: Upload API docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-docs
          path: apps/backend/docs/
          retention-days: 1

  build-webui-user-docs:
    name: Build WebUI User Docs
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @cellarboss/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @cellarboss/web exec playwright install-deps chromium

      - name: Generate documentation screenshots
        run: pnpm --filter @cellarboss/web docs:screenshots
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CELLARBOSS_SERVER: http://localhost:5173
          BETTER_AUTH_SECRET: docs-build-secret
          BETTER_AUTH_URL: http://localhost:5173

      - name: Build user docs
        run: pnpm --filter @cellarboss/web docs:build

      - name: Upload user docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webui-user-docs
          path: apps/web/docs/.vitepress/dist/
          retention-days: 1

  build-mobile-user-docs:
    name: Build Mobile User Docs
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Cache AVD
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-${{ runner.os }}

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          sdkmanager "system-images;android-31;google_apis;x86_64"
          echo "no" | avdmanager create avd -n test_device -k "system-images;android-31;google_apis;x86_64" --device "pixel_6"

      - name: Cache Expo prebuild
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: expo-prebuild-cache
        with:
          path: apps/mobile/android/
          key: expo-prebuild-android-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/app.config.ts') }}

      - name: Expo prebuild (Android)
        if: steps.expo-prebuild-cache.outputs.cache-hit != 'true'
        run: cd apps/mobile && npx expo prebuild --platform android --clean

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Android release APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease -PreactNativeArchitectures=x86_64 --no-daemon --build-cache

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start mock server
        run: pnpm --filter @cellarboss/mock-server start &

      - name: Wait for mock server
        run: |
          TIMEOUT=30
          ELAPSED=0
          until curl -sf "http://localhost:5174/__test/healthcheck" > /dev/null 2>&1; do
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "Mock server did not start within ${TIMEOUT}s"
              exit 1
            fi
            sleep 1
            ELAPSED=$((ELAPSED + 1))
          done
          echo "Mock server is ready."

      - name: Generate screenshots
        timeout-minutes: 20
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 180000
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          avd-name: test_device
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            adb install apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            cd apps/mobile && pnpm docs:screenshots

      - name: Build mobile docs
        run: pnpm --filter @cellarboss/mobile docs:build

      - name: Upload mobile docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-user-docs
          path: apps/mobile/docs/.vitepress/dist/
          retention-days: 1

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [build-api-docs, build-webui-user-docs, build-mobile-user-docs]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download API docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-docs
          path: _site/api

      - name: Download webUI user docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: webui-user-docs
          path: _site/web

      - name: Download mobile user docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mobile-user-docs
          path: _site/mobile

      - name: Create landing page
        run: |
          cat > _site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Cellarboss Documentation</title>
            <meta http-equiv="refresh" content="0; url=web/">
          </head>
          <body>
            <a href="web/">Web UI User Guide</a> | <a href="mobile/">Mobile App Guide</a> | <a href="api/">API Reference</a>
          </body>
          </html>
          LANDING

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Cache Expo prebuild
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/mobile/android/
          key: expo-prebuild-android-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/app.config.ts') }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Expo prebuild (Android)
        run: cd apps/mobile && npx expo prebuild --platform android --clean
        env:
          APP_VERSION: ${{ github.ref_name }}

      - name: Build Android release AAB
        run: |
          cd apps/mobile/android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 1

  deploy-android:
    name: Deploy to Google Play
    runs-on: ubuntu-latest
    needs: [build-android]

    steps:
      - name: Download Android AAB
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-aab
          path: artifacts/

      - name: Generate What's New text
        env:
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p whatsnew
          echo "See what's new in this release: https://github.com/${RELEASE_REPO}/releases/tag/${RELEASE_TAG}" > whatsnew/whatsnew-en-US
          echo "See what's new in this release: https://github.com/${RELEASE_REPO}/releases/tag/${RELEASE_TAG}" > whatsnew/whatsnew-en-GB

      - name: Upload to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.cellarboss.mobile
          releaseFiles: artifacts/app-release.aab
          track: internal
          status: draft
          whatsNewDirectory: whatsnew

  create-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-frontend, docker-backend, build-android]
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download Android AAB
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-aab
          path: artifacts/

      - name: Rename AAB with version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: mv artifacts/app-release.aab "artifacts/cellarboss-${RELEASE_TAG}-android.aab"

      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        id: release
        with:
          publish: true
          tag: ${{ github.ref_name }}
          name: 'Release ${{ github.ref_name }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB to release
        run: gh release upload "$RELEASE_TAG" "artifacts/cellarboss-${RELEASE_TAG}-android.aab" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}

  docker-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/cellarboss-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [prettier, tests, smoketest-android]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/cellarboss-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
