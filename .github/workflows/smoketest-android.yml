name: Android E2E Smoke Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test-android:
    name: Android Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Cache AVD
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-${{ runner.os }}

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          sdkmanager "system-images;android-31;google_apis;x86_64"
          echo "no" | avdmanager create avd -n test_device -k "system-images;android-31;google_apis;x86_64" --device "pixel_6"

      - name: Cache Expo prebuild
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: expo-prebuild-cache
        with:
          path: apps/mobile/android/
          key: expo-prebuild-android-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/app.config.ts') }}

      - name: Expo prebuild (Android)
        if: steps.expo-prebuild-cache.outputs.cache-hit != 'true'
        run: cd apps/mobile && npx expo prebuild --platform android --clean

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Android release APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease -PreactNativeArchitectures=x86_64 --no-daemon --build-cache

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start mock server
        run: pnpm --filter @cellarboss/mock-server start &

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start emulator and run smoke tests
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 180000
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          avd-name: test_device
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            adb install apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            cd apps/mobile/e2e && maestro test --debug-output "$GITHUB_WORKSPACE/maestro-debug-output" --flatten-debug-output smoke/

      - name: Upload Maestro debug output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: maestro-debug-output
          path: maestro-debug-output/
          retention-days: 7
