packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@prisma/client': true
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true

catalog:
  '@tanstack/react-query': 5.101.0
  '@tanstack/react-form': 1.33.0
  '@tanstack/react-table': 8.21.3
  'react': 19.2.0
  'react-dom': 19.2.0
  'react-test-renderer': 19.2.0

overrides:
  better-call: 1.3.6 # Pin to the 1.3.x line better-auth targets; @better-auth/cli drags in an older version, so dedupe here. Do NOT bump across the v2 major - 2.x drops the root serializeCookie export better-auth imports.

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
