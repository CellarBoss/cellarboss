packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@prisma/client': true
  better-sqlite3: true
  esbuild: true
  lefthook: true
  sharp: true
  unrs-resolver: true

overrides:
  # @better-auth/core@1.6.x peer-requires EXACTLY better-call 1.3.6 (not a held-back version - it's the version this better-auth line is built against; 2.x is a future major it doesn't support). The dev-only @better-auth/cli lags at 1.4.x and would otherwise drag in better-call 1.1.8, leaving core's peer unmet. Pin the whole workspace to 1.3.6. Renovate must NOT bump this across the v2 major (2.x drops the root serializeCookie export better-auth imports).
  better-call: 1.3.6

catalog:
  '@tanstack/react-query': 5.101.2
  '@tanstack/react-form': 1.33.0
  '@tanstack/react-table': 8.21.3
  'react': 19.2.0
  'react-dom': 19.2.0
  'react-test-renderer': 19.2.0

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp

minimumReleaseAgeExclude:
  - '@expo/cli@55.0.33'
  - '@expo/config@55.0.18'
  - '@expo/local-build-cache-provider@55.0.14'
  - '@expo/metro-config@55.0.24'
  - '@expo/prebuild-config@55.0.19'
  - babel-preset-expo@55.0.23
  - expo-file-system@55.0.23
  - expo@55.0.27
  - expo-application@55.0.16
  - expo-haptics@55.0.15
  - expo-image-picker@55.0.21
  - expo-linking@55.0.16
  - expo-secure-store@55.0.15
  - jest-expo@55.0.19
