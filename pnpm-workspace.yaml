packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@prisma/client': true
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true

catalog:
  '@tanstack/react-query': 5.100.10
  '@tanstack/react-form': 1.32.0
  '@tanstack/react-table': 8.21.3
  'react': 19.2.0
  'react-dom': 19.2.0
  'react-test-renderer': 19.2.0

overrides:
  better-call: 1.3.5 # Required until @better-auth/cli is updated to depend on a newer better-call version

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
